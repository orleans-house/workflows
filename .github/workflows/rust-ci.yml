name: Rust CI

on:
  workflow_call:
    inputs:
      notify_message:
        description: "Discord通知のメッセージプレフィックス"
        type: string
        default: "✅ CI Passed! @saya Please review:"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all
      - name: Notify Discord
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            PR_URL="${{ github.event.pull_request.html_url }}"
            if [ -n "$PR_URL" ]; then
              MSG="${{ inputs.notify_message }} ${PR_URL}"
            else
              MSG="${{ inputs.notify_message }} https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            fi
            curl -fsSL -H "Content-Type: application/json" \
              -d "{\"content\": \"${MSG}\"}" \
              "$DISCORD_WEBHOOK"
          fi
